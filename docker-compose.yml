services:
  buecher-app:
    build: .
    container_name: booktracker_dev
    ports:
      - "8080:8080"
    volumes:
      # Local Mapping: Code-Änderungen auf dem Laptop werden SOFORT im Container aktiv
      - .:/app
      # Separates Volume für die SQLite-Datenbankdatei, damit sie Neustarts überlebt
      - buecher_data:/app/data
    environment:
      - TZ=Europe/Berlin
      - PYTHONUNBUFFERED=1
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}  

volumes:
  buecher_data: